<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07101e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>晴仁の誕生日ポケカくじ</title>
<style>
:root{--gold:#ffd627;--gold2:#ffad00;--bg:#06101d;--muted:#c7d7eb}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#fff;background:#06101d}
body{min-height:100vh;overflow-x:hidden;background:radial-gradient(circle at 50% -12%,#3d6da9 0,#17365f 27%,#09182e 55%,#040911 100%)}
button{font:inherit}
.app{width:min(100%,620px);margin:auto;padding:calc(14px + env(safe-area-inset-top)) 14px 45px;text-align:center}
.hero{position:relative;padding:8px 4px 15px}
.hero:before{content:"";position:absolute;inset:-35px -90px auto;height:270px;background:radial-gradient(circle,#ffdc5c35 0,transparent 70%);pointer-events:none}
.eyebrow{position:relative;font-size:13px;letter-spacing:.18em;color:#ffe98d;font-weight:1000;margin-bottom:6px}
h1{position:relative;margin:0;font-size:clamp(30px,9.5vw,52px);line-height:1.12;text-shadow:0 4px 18px #000}
.hero-sub{position:relative;margin:8px 0 0;color:#dbeafe;font-weight:900;font-size:clamp(15px,4.2vw,18px)}
.topbar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:9px 0 13px}
.pill{border:1px solid #ffffff36;background:#ffffff13;color:#fff;border-radius:999px;padding:9px 14px;font-weight:1000;backdrop-filter:blur(8px)}
.info{background:linear-gradient(135deg,#ffffff17,#ffffff08);border:1px solid #ffffff2c;border-radius:18px;padding:12px 14px;line-height:1.55;font-size:14px;box-shadow:inset 0 1px #ffffff20}
.progress-wrap{margin:14px 2px 15px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-weight:1000}
#remaining{color:#ffe87e}
.progress{height:12px;border-radius:999px;background:#ffffff14;border:1px solid #ffffff20;overflow:hidden}
.progress>div{height:100%;width:100%;border-radius:999px;background:linear-gradient(90deg,#ffe86c,#ffb300);transition:width .5s ease}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
.ticket{position:relative;min-height:132px;border:3px solid #fff7bd;border-radius:23px;background:radial-gradient(circle at 24% 13%,#fff9bd 0,#ffe548 24%,#ffbb05 72%,#ed9000 100%);color:#392100;box-shadow:0 8px 0 #8f4c00,0 16px 28px #0007;cursor:pointer;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:transform .16s,opacity .35s,filter .35s}
.ticket:active{transform:translateY(4px);box-shadow:0 4px 0 #8f4c00,0 8px 15px #0007}
.ticket:before,.ticket:after{content:"";position:absolute;width:86px;height:86px;border:5px solid #fff6;border-radius:50%}
.ticket:before{left:-46px;top:-46px}.ticket:after{right:-47px;bottom:-47px}
.shine{position:absolute;inset:-90%;background:linear-gradient(110deg,transparent 42%,#fff9 50%,transparent 58%);animation:shine 3.4s infinite}
@keyframes shine{58%,100%{transform:translateX(62%)}}
.num{position:relative;z-index:2;display:block;font-size:51px;font-weight:1000;line-height:1;text-shadow:0 2px #fff9}
.tap{position:relative;z-index:2;display:block;margin-top:8px;font-size:12px;font-weight:1000;letter-spacing:.16em}
.ticket.used{pointer-events:none;animation:ticketOut .55s forwards}
@keyframes ticketOut{to{transform:scale(.35) rotate(10deg);opacity:0}}
.ticket.gone{visibility:hidden}
.stage{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:18px;background:#020713f7}
.stage.show{display:flex}
.suspense{width:min(94vw,500px);text-align:center}
.drum{position:relative;width:178px;height:178px;margin:0 auto 24px;border-radius:50%;background:radial-gradient(circle,#fb7185 0 42%,#991b1b 44% 57%,#f8fafc 59% 66%,#78350f 68%);box-shadow:0 0 60px #ffdf6877;animation:beat .17s infinite alternate}
.drum:before,.drum:after{content:"";position:absolute;width:14px;height:136px;border-radius:9px;background:linear-gradient(#fff7ae,#b45309);top:-38px;transform-origin:bottom}
.drum:before{left:40px;transform:rotate(-33deg);animation:stickL .20s infinite alternate}
.drum:after{right:40px;transform:rotate(33deg);animation:stickR .20s infinite alternate}
@keyframes beat{to{transform:scale(1.05)}}@keyframes stickL{to{transform:rotate(-7deg)}}@keyframes stickR{to{transform:rotate(7deg)}}
.suspense h2{font-size:clamp(35px,11vw,60px);margin:0;text-shadow:0 0 26px #ffd31a}
.suspense p{font-size:18px;font-weight:900;color:#dbeafe}
.countdown{font-size:18px;color:#ffe88b;font-weight:1000;margin-top:10px}
.skip{margin-top:20px;border:1px solid #ffffff35;background:#ffffff12;color:#fff;border-radius:999px;padding:9px 14px;font-weight:900}
.result{position:relative;width:min(95vw,530px);min-height:500px;border-radius:32px;padding:31px 20px 25px;display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;border:3px solid #fff;box-shadow:0 30px 95px #000;background:#17253c}
.result.show{display:flex;animation:resultIn .58s cubic-bezier(.2,1.45,.35,1)}
@keyframes resultIn{from{transform:scale(.18) rotate(-8deg);opacity:0}to{transform:scale(1);opacity:1}}
.result:before{content:"";position:absolute;inset:-65%;background:conic-gradient(transparent 0 7%,#ffffff40 7% 10%,transparent 10% 17%);animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result>*{position:relative;z-index:3}
.result.mega{background:radial-gradient(circle,#cf321b 0,#6a1500 52%,#160400 100%);border-color:#fff1a6;box-shadow:0 0 85px #ffb000aa,0 30px 95px #000}
.result.ninja{background:radial-gradient(circle,#178ecb 0,#073c65 54%,#031421 100%)}
.result.abyss{background:radial-gradient(circle,#7539ca 0,#2e125b 55%,#0c0619 100%)}
.result.normal{background:radial-gradient(circle,#5a6d88 0,#293950 57%,#09111e 100%)}
.icon{font-size:74px;filter:drop-shadow(0 8px 12px #000);animation:float 1s infinite alternate}
@keyframes float{to{transform:translateY(-9px) scale(1.06)}}
.rank{font-size:clamp(21px,6vw,31px);font-weight:1000;margin:8px 0;color:#fff5b5;text-shadow:0 3px 12px #000}
.prize{font-size:clamp(38px,11vw,64px);font-weight:1000;line-height:1.08;margin:7px 0 13px;text-shadow:0 6px 20px #000}
.mega .prize{color:#fff25b;text-shadow:0 0 12px #ff9d00,0 0 34px #ff3c00,0 6px 20px #000}
.ninja .prize{color:#91edff}.abyss .prize{color:#d9bdff}
.sub{font-size:21px;font-weight:900;color:#eef6ff;margin-bottom:22px}
.back{border:0;border-radius:999px;background:#fff;color:#111827;min-width:215px;padding:14px 23px;font-weight:1000;font-size:18px;box-shadow:0 6px 0 #9ca3af}
.confetti{position:fixed;inset:0;z-index:95;pointer-events:none;overflow:hidden}
.confetti i{position:absolute;top:-14%;left:var(--x);width:11px;height:21px;background:var(--c);border-radius:2px;animation:fall var(--d) linear forwards;animation-delay:var(--delay)}
@keyframes fall{to{transform:translateY(124vh) rotate(1000deg)}}
.history{margin-top:18px;background:#ffffff0c;border:1px solid #ffffff1c;border-radius:17px;padding:12px 13px;text-align:left}
.history h3{margin:0 0 8px;font-size:15px;color:#dbeafe}
#historyList{display:flex;gap:7px;flex-wrap:wrap}
.history-chip{font-size:12px;font-weight:900;padding:7px 9px;border-radius:999px;background:#ffffff12;border:1px solid #ffffff1c}
.complete{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle,#42320a 0,#100b02 60%,#020202 100%)}
.complete.show{display:flex}
.complete-card{text-align:center;max-width:520px}
.complete-card .big{font-size:82px}
.complete-card h2{font-size:clamp(38px,12vw,66px);margin:5px 0;color:#fff16a;text-shadow:0 0 25px #ff8a00}
.complete-card p{font-size:19px;font-weight:900}
.footer{margin-top:17px;color:#b9c8dc;font-size:12px;line-height:1.65}
</style>
</head>
<body>
<main class="app">
<header class="hero">
<div class="eyebrow">HAPPY BIRTHDAY</div>
<h1>🎂 晴仁の誕生日<br>ポケカくじ 🎉</h1>
<p class="hero-sub">好きな番号をひとつ選んでタップ！</p>
</header>

<div class="topbar">
<button id="soundBtn" class="pill" type="button">🔊 効果音 ON</button>
<button id="resetBtn" class="pill" type="button">↻ 最初から</button>
</div>

<div class="info">番号を押すとドラムロールが始まります。<br>結果発表まで、そのままお待ちください。</div>

<section class="progress-wrap">
<div class="progress-row"><span>くじの進み具合</span><span id="remaining">残り10枚</span></div>
<div class="progress"><div id="progressBar"></div></div>
</section>

<div id="grid" class="grid">
<button class="ticket" type="button" data-index="0"><span class="shine"></span><span><span class="num">1</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="1"><span class="shine"></span><span><span class="num">2</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="2"><span class="shine"></span><span><span class="num">3</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="3"><span class="shine"></span><span><span class="num">4</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="4"><span class="shine"></span><span><span class="num">5</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="5"><span class="shine"></span><span><span class="num">6</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="6"><span class="shine"></span><span><span class="num">7</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="7"><span class="shine"></span><span><span class="num">8</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="8"><span class="shine"></span><span><span class="num">9</span><span class="tap">TAP!</span></span></button><button class="ticket" type="button" data-index="9"><span class="shine"></span><span><span class="num">10</span><span class="tap">TAP!</span></span></button>
</div>

<section class="history">
<h3>これまでの結果</h3>
<div id="historyList"><span style="color:#9fb2ca;font-size:12px">まだ引いていません</span></div>
</section>

<div class="footer">賞品：メガドリームex×1／ニンジャスピナー×1／アビスアイ×2／ポケカ2パック×6<br>抽選状況はこの端末に保存されます。</div>
</main>

<div id="stage" class="stage">
<div id="suspense" class="suspense">
<div class="drum"></div>
<h2>抽選中…</h2>
<p>何が当たるかな？</p>
<div id="countdown" class="countdown">ドラムロール！</div>
<button id="skipBtn" class="skip" type="button">演出をスキップ</button>
</div>

<div id="result" class="result">
<div id="resultIcon" class="icon"></div>
<div id="resultRank" class="rank"></div>
<div id="resultPrize" class="prize"></div>
<div id="resultSub" class="sub"></div>
<button id="backBtn" class="back" type="button">くじに戻る</button>
</div>
</div>

<div id="confetti" class="confetti"></div>

<div id="complete" class="complete">
<div class="complete-card">
<div class="big">🏆</div>
<h2>コンプリート！</h2>
<p>晴仁、お誕生日おめでとう！<br>全部のくじを引き終わりました。</p>
<button id="completeClose" class="back" type="button">結果を見る</button>
</div>
</div>

<script>
(function(){
"use strict";
const STORAGE_KEY="haruto_pokeca_kuji_v2";
const prizes=[{"type": "normal", "label": "参加賞", "sub": "ポケカ 2パック", "icon": "🎁", "rank": "おめでとう"}, {"type": "abyss", "label": "アビスアイ", "sub": "やったね！", "icon": "✨", "rank": "BOX当たり"}, {"type": "normal", "label": "参加賞", "sub": "ポケカ 2パック", "icon": "🎁", "rank": "おめでとう"}, {"type": "normal", "label": "参加賞", "sub": "ポケカ 2パック", "icon": "🎁", "rank": "おめでとう"}, {"type": "ninja", "label": "ニンジャスピナー", "sub": "ナイスゲット！", "icon": "⚡", "rank": "BOX当たり"}, {"type": "normal", "label": "参加賞", "sub": "ポケカ 2パック", "icon": "🎁", "rank": "おめでとう"}, {"type": "mega", "label": "メガドリームex", "sub": "本日のスペシャル賞！", "icon": "👑", "rank": "超大当たり"}, {"type": "normal", "label": "参加賞", "sub": "ポケカ 2パック", "icon": "🎁", "rank": "おめでとう"}, {"type": "abyss", "label": "アビスアイ", "sub": "やったね！", "icon": "✨", "rank": "BOX当たり"}, {"type": "normal", "label": "参加賞", "sub": "ポケカ 2パック", "icon": "🎁", "rank": "おめでとう"}];
let state={used:[],history:[]},soundOn=true,busy=false,currentIndex=null,revealTimer=null,countTimer=null;
let audioCtx=null;

const tickets=[...document.querySelectorAll(".ticket")];
const stage=document.getElementById("stage");
const suspense=document.getElementById("suspense");
const result=document.getElementById("result");
const remainingEl=document.getElementById("remaining");
const progressBar=document.getElementById("progressBar");
const historyList=document.getElementById("historyList");
const countdown=document.getElementById("countdown");
const complete=document.getElementById("complete");

function ctx(){
 if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 if(audioCtx.state==="suspended") audioCtx.resume();
 return audioCtx;
}
function tone(freq,start,dur,type="sine",gain=.08){
 if(!soundOn)return;
 const c=ctx(),o=c.createOscillator(),g=c.createGain();
 o.type=type;o.frequency.value=freq;
 g.gain.setValueAtTime(.0001,c.currentTime+start);
 g.gain.exponentialRampToValueAtTime(gain,c.currentTime+start+.01);
 g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+start+dur);
 o.connect(g).connect(c.destination);o.start(c.currentTime+start);o.stop(c.currentTime+start+dur+.03);
}
function noise(start,dur,gain=.08){
 if(!soundOn)return;
 const c=ctx(),len=Math.floor(c.sampleRate*dur),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);
 for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
 const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.value=gain;s.connect(g).connect(c.destination);s.start(c.currentTime+start);
}
function drumRoll(){
 if(!soundOn)return;
 ctx();
 let t=0,step=.17;
 while(t<2.8){noise(t,.09,.045);tone(92,t,.08,"sine",.025);t+=step;step=Math.max(.04,step*.945);}
 noise(2.85,.35,.13);tone(72,2.84,.32,"sine",.11);
}
function fanfare(type){
 if(!soundOn)return;
 ctx();
 noise(0,.45,type==="mega"?.14:.08);
 const sets={
 normal:[[659,0,.18],[784,.2,.2],[988,.43,.48]],
 abyss:[[523,0,.2],[659,.23,.2],[784,.47,.25],[1047,.78,.62]],
 ninja:[[784,0,.14],[988,.16,.14],[1175,.33,.16],[1319,.53,.2],[1568,.78,.6]],
 mega:[[1047,0,.14],[1175,.16,.14],[1319,.33,.16],[1568,.53,.19],[1760,.76,.25],[2093,1.05,.95]]
 };
 sets[type].forEach(n=>{tone(n[0],n[1],n[2],type==="ninja"||type==="mega"?"square":"triangle",type==="mega"?.10:.075);tone(n[0]/2,n[1],n[2],"sine",.035);});
 if(type==="mega"){[[523,0,.32],[587,.36,.32],[659,.72,.34],[784,1.05,.95]].forEach(n=>tone(n[0],n[1],n[2],"triangle",.075));}
}
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)state=JSON.parse(r)}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function vibrate(p){try{if(navigator.vibrate)navigator.vibrate(p)}catch(e){}}
function updateUI(){
 tickets.forEach((t,i)=>{if(state.used.includes(i)){t.classList.add("gone");t.disabled=true}else{t.classList.remove("gone","used");t.disabled=false}});
 const remain=10-state.used.length;remainingEl.textContent="残り"+remain+"枚";progressBar.style.width=(remain*10)+"%";
 historyList.innerHTML="";
 if(!state.history.length)historyList.innerHTML='<span style="color:#9fb2ca;font-size:12px">まだ引いていません</span>';
 else state.history.forEach(h=>{const s=document.createElement("span");s.className="history-chip";s.textContent=h.no+"番："+h.label;historyList.appendChild(s)});
}
function confetti(type){
 const box=document.getElementById("confetti");box.innerHTML="";
 const count=type==="mega"?150:type==="normal"?55:90;
 const colors=type==="mega"?["#fff36a","#ff3b45","#38bdf8","#fff","#a78bfa","#22c55e","#ff9f1c"]:["#ffd31a","#38bdf8","#fb7185","#a78bfa","#fff","#34d399"];
 for(let i=0;i<count;i++){const el=document.createElement("i");el.style.setProperty("--x",Math.random()*100+"%");el.style.setProperty("--c",colors[Math.floor(Math.random()*colors.length)]);el.style.setProperty("--d",1.8+Math.random()*1.9+"s");el.style.setProperty("--delay",Math.random()*.5+"s");box.appendChild(el)}
 setTimeout(()=>box.innerHTML="",4300);
}
function startDraw(index){
 if(busy||state.used.includes(index))return;
 busy=true;currentIndex=index;stage.classList.add("show");suspense.style.display="block";result.className="result";countdown.textContent="ドラムロール！";
 drumRoll();vibrate([55,45,55,45,80]);
 let n=3;countTimer=setInterval(()=>{n--;countdown.textContent=n>0?"結果発表まで "+n+"…":"まもなく発表！"},900);
 revealTimer=setTimeout(showResult,3150);
}
function showResult(){
 if(currentIndex===null)return;
 clearTimeout(revealTimer);clearInterval(countTimer);
 const won=prizes[currentIndex];suspense.style.display="none";result.className="result show "+won.type;
 document.getElementById("resultIcon").textContent=won.icon;document.getElementById("resultRank").textContent=won.rank;document.getElementById("resultPrize").textContent=won.label;document.getElementById("resultSub").textContent=won.sub;
 fanfare(won.type);confetti(won.type);vibrate(won.type==="mega"?[180,70,180,70,400]:[100,55,170]);
}
function closeResult(){
 if(currentIndex===null)return;
 const idx=currentIndex,won=prizes[idx];stage.classList.remove("show");tickets[idx].classList.add("used");
 setTimeout(()=>tickets[idx].classList.add("gone"),500);
 if(!state.used.includes(idx))state.used.push(idx);state.history.push({no:idx+1,label:won.label});saveState();currentIndex=null;busy=false;updateUI();
 if(state.used.length===10)setTimeout(()=>{complete.classList.add("show");fanfare("mega");confetti("mega");vibrate([160,70,160,70,350])},700);
}
tickets.forEach((t,i)=>t.addEventListener("click",()=>startDraw(i)));
document.getElementById("skipBtn").addEventListener("click",showResult);
document.getElementById("backBtn").addEventListener("click",closeResult);
document.getElementById("soundBtn").addEventListener("click",e=>{soundOn=!soundOn;e.currentTarget.textContent=soundOn?"🔊 効果音 ON":"🔇 効果音 OFF"});
document.getElementById("resetBtn").addEventListener("click",()=>{if(confirm("くじを最初の状態に戻しますか？")){state={used:[],history:[]};saveState();updateUI();complete.classList.remove("show")}});
document.getElementById("completeClose").addEventListener("click",()=>complete.classList.remove("show"));
loadState();updateUI();
})();
</script>
</body>
</html>
